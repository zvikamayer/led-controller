<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שלט LED חכם</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    h1 { font-size: 1.4rem; color: #aaa; letter-spacing: 2px; text-transform: uppercase; }

    /* ---- Clock ---- */
    #clock {
      font-size: 5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 6px;
      text-shadow: 0 0 30px #6c63ff88;
    }
    #date-display { color: #888; font-size: 1rem; margin-top: 0.3rem; }

    /* ---- Status ---- */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: #aaa;
    }
    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.4s;
    }
    #status-dot.connected { background: #4cff91; box-shadow: 0 0 8px #4cff91; }
    #status-dot.error     { background: #ff4c4c; box-shadow: 0 0 8px #ff4c4c; }

    /* ---- LED card ---- */
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }
    .card h2 { font-size: 1rem; color: #888; margin-bottom: 1rem; }

    /* Manual toggle */
    #led-toggle {
      width: 100%;
      padding: 0.9rem;
      border-radius: 10px;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      background: #2a2a4a;
      color: #aaa;
    }
    #led-toggle.on {
      background: #ffe066;
      color: #1a1a00;
      box-shadow: 0 0 20px #ffe06688;
    }

    /* LED visual */
    #led-visual {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #2a2a2a;
      margin: 1rem auto;
      transition: all 0.4s;
    }
    #led-visual.on {
      background: #ffe066;
      box-shadow: 0 0 20px #ffe066, 0 0 50px #ffe06655;
    }

    /* ---- Schedule ---- */
    .add-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .add-row input[type="time"] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #3a3a5a;
      background: #12122a;
      color: #e0e0f0;
      font-size: 1rem;
    }
    .add-row select {
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #3a3a5a;
      background: #12122a;
      color: #e0e0f0;
      font-size: 0.95rem;
    }
    .btn {
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .btn-add  { background: #6c63ff; color: #fff; }
    .btn-add:hover { background: #857bff; }

    #schedule-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    #schedule-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #12122a;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.95rem;
    }
    .tag {
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .tag-on  { background: #ffe06622; color: #ffe066; }
    .tag-off { background: #ffffff11; color: #aaa; }

    .btn-del {
      background: transparent;
      border: 1px solid #3a3a5a;
      color: #ff6b6b;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-del:hover { background: #ff6b6b22; }

    #sync-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #6c63ff;
      background: transparent;
      color: #6c63ff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    #sync-btn:hover { background: #6c63ff22; }

    #empty-msg { color: #444; font-size: 0.9rem; text-align: center; padding: 1rem; }
  </style>
</head>
<body>

<h1>🌐 שלט LED חכם</h1>

<div id="clock">00:00:00</div>
<div id="date-display"></div>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">מתחבר ל-MQTT...</span>
</div>

<!-- Manual Control -->
<div class="card">
  <h2>שליטה ידנית</h2>
  <div id="led-visual"></div>
  <button id="led-toggle" onclick="toggleLED()">💡 הדלק</button>
</div>

<!-- Scheduler -->
<div class="card">
  <h2>📅 לוז אוטומטי</h2>
  <div style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;">
    <div class="add-row">
      <label style="color:#aaa;font-size:0.85rem;min-width:60px;">💡 הדלקה</label>
      <input type="number" id="on-day" min="1" max="31" placeholder="יום" style="width:60px;" />
      <input type="number" id="on-month" min="1" max="12" placeholder="חודש" style="width:70px;" />
      <input type="number" id="on-year" min="2024" max="2099" placeholder="שנה" style="width:80px;" />
      <input type="text" id="on-time" placeholder="09:00:00" maxlength="8" style="width:90px;" />
    </div>
    <div class="add-row">
      <label style="color:#aaa;font-size:0.85rem;min-width:60px;">⚫ כיבוי</label>
      <input type="number" id="off-day" min="1" max="31" placeholder="יום" style="width:60px;" />
      <input type="number" id="off-month" min="1" max="12" placeholder="חודש" style="width:70px;" />
      <input type="number" id="off-year" min="2024" max="2099" placeholder="שנה" style="width:80px;" />
      <input type="text" id="off-time" placeholder="09:01:00" maxlength="8" style="width:90px;" />
    </div>
    <button class="btn btn-add" onclick="addSchedule()" style="width:100%;">+ הוסף לוז</button>
  </div>
  <ul id="schedule-list">
    <li id="empty-msg">אין לוז עדיין</li>
  </ul>
  <button id="sync-btn" onclick="syncSchedule()">📤 שלח לוז ל-ESP32</button>
</div>

<!-- Relay Control -->
<div class="card">
  <h2>⚡ הפעלה X</h2>
  <div id="relay-visual" style="width:40px;height:40px;border-radius:50%;background:#2a2a2a;margin:1rem auto;transition:all 0.4s;"></div>
  <button id="relay-toggle" onclick="toggleRelay()" style="width:100%;padding:0.9rem;border-radius:10px;border:none;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.3s;background:#2a2a4a;color:#aaa;">⚡ הפעל</button>
</div>

<!-- Relay Scheduler -->
<div class="card">
  <h2>📅 לוז הפעלה X</h2>
  <div style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;">
    <div class="add-row">
      <label style="color:#aaa;font-size:0.85rem;min-width:60px;">⚡ הפעלה</label>
      <input type="number" id="rx-on-day" min="1" max="31" placeholder="יום" style="width:60px;" />
      <input type="number" id="rx-on-month" min="1" max="12" placeholder="חודש" style="width:70px;" />
      <input type="number" id="rx-on-year" min="2024" max="2099" placeholder="שנה" style="width:80px;" />
      <input type="text" id="rx-on-time" placeholder="09:00:00" maxlength="8" style="width:90px;" />
    </div>
    <div class="add-row">
      <label style="color:#aaa;font-size:0.85rem;min-width:60px;">⚫ כיבוי</label>
      <input type="number" id="rx-off-day" min="1" max="31" placeholder="יום" style="width:60px;" />
      <input type="number" id="rx-off-month" min="1" max="12" placeholder="חודש" style="width:70px;" />
      <input type="number" id="rx-off-year" min="2024" max="2099" placeholder="שנה" style="width:80px;" />
      <input type="text" id="rx-off-time" placeholder="09:01:00" maxlength="8" style="width:90px;" />
    </div>
    <button class="btn btn-add" onclick="addRelaySchedule()" style="width:100%;">+ הוסף לוז</button>
  </div>
  <ul id="relay-schedule-list">
    <li id="relay-empty-msg">אין לוז עדיין</li>
  </ul>
  <button id="relay-sync-btn" onclick="syncRelaySchedule()" style="width:100%;margin-top:1rem;padding:0.7rem;border-radius:8px;border:1px solid #6c63ff;background:transparent;color:#6c63ff;font-size:0.95rem;font-weight:600;cursor:pointer;">📤 שלח לוז ל-ESP32</button>
</div>

<!-- OLED Draw -->
<div class="card">
  <h2>🎨 ציור על המסך</h2>
  <canvas id="oled-canvas" width="512" height="256"
    style="display:block;margin:0 auto;cursor:crosshair;border:2px solid #444;border-radius:6px;background:#000;touch-action:none;"></canvas>
  <div style="display:flex;gap:0.5rem;margin-top:0.8rem;">
    <button onclick="clearCanvas()" style="flex:1;padding:0.6rem;border-radius:8px;border:1px solid #555;background:transparent;color:#aaa;cursor:pointer;">🗑 נקה</button>
    <button onclick="sendOLED()" style="flex:2;padding:0.6rem;border-radius:8px;border:none;background:#6c63ff;color:white;font-weight:600;cursor:pointer;">📤 שלח למסך</button>
    <button onclick="resetOLED()" style="flex:1;padding:0.6rem;border-radius:8px;border:1px solid #ff6b6b;background:transparent;color:#ff6b6b;cursor:pointer;">🕐 שעון</button>
  </div>
  <div style="display:flex;gap:0.5rem;margin-top:0.8rem;align-items:center;flex-wrap:wrap;">
    <input id="oled-text" type="text" placeholder="כתוב טקסט ואז גרור אותו על המסך..." style="flex:3;min-width:150px;padding:0.5rem;border-radius:8px;border:1px solid #444;background:#1a1a2e;color:white;font-size:0.95rem;" />
    <select id="oled-fontsize" style="padding:0.5rem;border-radius:8px;border:1px solid #444;background:#1a1a2e;color:white;">
      <option value="8">קטן</option>
      <option value="16" selected>בינוני</option>
      <option value="24">גדול</option>
    </select>
    <select id="oled-fontweight" style="padding:0.5rem;border-radius:8px;border:1px solid #444;background:#1a1a2e;color:white;">
      <option value="normal" selected>רגיל</option>
      <option value="bold">מודגש</option>
    </select>
  </div>
  <p style="text-align:center;color:#555;font-size:0.8rem;margin-top:0.5rem;">✏️ כתוב טקסט → גרור על הקנבס למיקום | 🖱 ציור: קליק שמאלי | מחיקה: קליק ימני</p>
</div>

<script>
  // ── OLED Canvas ──────────────────────────────────────────
  const COLS = 128, ROWS = 64;
  const SCALE = 4;
  const oledCanvas = document.getElementById('oled-canvas');
  const ctx = oledCanvas.getContext('2d');
  const pixels = new Uint8Array(COLS * ROWS);

  function drawPixel(x, y, val) {
    if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;
    pixels[y * COLS + x] = val;
    ctx.fillStyle = val ? '#ffffff' : '#000000';
    ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
  }

  function clearCanvas() {
    pixels.fill(0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, oledCanvas.width, oledCanvas.height);
  }

  function sendOLED() {
    if (!client || !client.connected) { alert('לא מחובר ל-MQTT'); return; }
    // Pack bits into bytes
    const bytes = new Uint8Array(COLS * ROWS / 8);
    for (let i = 0; i < pixels.length; i++) {
      if (pixels[i]) bytes[Math.floor(i/8)] |= (0x80 >> (i % 8));
    }
    // Base64 encode
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    const b64 = btoa(bin);
    client.publish(TOPIC_OLED_DRAW, b64, { retain: true });
    alert('✅ נשלח למסך!');
  }

  let drawing = false;
  let erasing = false;

  function getPixelPos(e) {
    const rect = oledCanvas.getBoundingClientRect();
    const scaleX = oledCanvas.width / rect.width;
    const scaleY = oledCanvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: Math.floor((clientX - rect.left) * scaleX / SCALE),
      y: Math.floor((clientY - rect.top)  * scaleY / SCALE)
    };
  }

  oledCanvas.addEventListener('mousedown',  e => { if (document.getElementById('oled-text').value) return; drawing = true; erasing = e.button === 2; const p = getPixelPos(e); drawPixel(p.x, p.y, erasing ? 0 : 1); });
  oledCanvas.addEventListener('mousemove',  e => { if (!drawing) return; const p = getPixelPos(e); drawPixel(p.x, p.y, erasing ? 0 : 1); });
  oledCanvas.addEventListener('mouseup',    () => drawing = false);
  oledCanvas.addEventListener('mouseleave', () => drawing = false);
  oledCanvas.addEventListener('contextmenu', e => e.preventDefault());
  oledCanvas.addEventListener('touchstart', e => { drawing = true; erasing = false; const p = getPixelPos(e); drawPixel(p.x, p.y, 1); e.preventDefault(); });
  oledCanvas.addEventListener('touchmove',  e => { if (!drawing) return; const p = getPixelPos(e); drawPixel(p.x, p.y, 1); e.preventDefault(); });
  oledCanvas.addEventListener('touchend',   () => drawing = false);

  // ── Text drag ────────────────────────────────────────────
  let textDragging = false;
  let textDragX = 0, textDragY = 0;

  function getTextPreview(x, y) {
    const text = document.getElementById('oled-text').value;
    const fontSize = parseInt(document.getElementById('oled-fontsize').value);
    // ציור מחדש עם preview
    redrawPixels();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    const fontWeight = document.getElementById('oled-fontweight').value;
    ctx.font = `${fontWeight} ${fontSize * SCALE}px monospace`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.fillText(text, x * SCALE, y * SCALE);
  }

  function stampText(x, y) {
    const text = document.getElementById('oled-text').value;
    if (!text) return;
    const fontSize = parseInt(document.getElementById('oled-fontsize').value);
    const tmp = document.createElement('canvas');
    tmp.width = oledCanvas.width; tmp.height = oledCanvas.height;
    const tc = tmp.getContext('2d');
    tc.fillStyle = '#000'; tc.fillRect(0, 0, tmp.width, tmp.height);
    tc.fillStyle = '#fff';
    const fontWeight2 = document.getElementById('oled-fontweight').value;
    tc.font = `${fontWeight2} ${fontSize * SCALE}px monospace`;
    tc.textBaseline = 'middle';
    tc.textAlign = 'center';
    tc.fillText(text, x * SCALE, y * SCALE);
    const imgData = tc.getImageData(0, 0, tmp.width, tmp.height);
    for (let py = 0; py < ROWS; py++) {
      for (let px2 = 0; px2 < COLS; px2++) {
        const si = (py * SCALE * tmp.width + px2 * SCALE) * 4;
        if (imgData.data[si] > 128) drawPixel(px2, py, 1);
      }
    }
  }

  function redrawPixels() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, oledCanvas.width, oledCanvas.height);
    for (let y = 0; y < ROWS; y++)
      for (let x = 0; x < COLS; x++)
        if (pixels[y * COLS + x]) { ctx.fillStyle = '#fff'; ctx.fillRect(x*SCALE, y*SCALE, SCALE, SCALE); }
  }

  // גרירת טקסט על הקנבס
  oledCanvas.addEventListener('mousemove', e => {
    const text = document.getElementById('oled-text').value;
    if (!text) return;
    if (drawing) return; // במצב ציור רגיל — אל תציג preview
    const p = getPixelPos(e);
    getTextPreview(p.x, p.y);
  });

  oledCanvas.addEventListener('click', e => {
    const text = document.getElementById('oled-text').value;
    if (!text) return;
    if (e.button !== 0) return;
    const p = getPixelPos(e);
    stampText(p.x, p.y);
  });

  oledCanvas.addEventListener('mouseleave', () => {
    const text = document.getElementById('oled-text').value;
    if (text && !drawing) redrawPixels();
  });

  function addText() {} // נשמר לתאימות

  function resetOLED() {
    if (!client || !client.connected) { alert('לא מחובר ל-MQTT'); return; }
    client.publish(TOPIC_OLED_DRAW, '', { retain: true });
    alert('✅ המסך חזר לשעון!');
  }


  // ── Config ──────────────────────────────────────────────
  // שנה את הערכים האלו לפי ה-HiveMQ שלך
  const BROKER_URL = 'wss://broker.hivemq.com:8884/mqtt';
  const TOPIC_CMD  = 'led-scheduler/cmd';
  const TOPIC_SCHED = 'led-scheduler/schedule';
  const TOPIC_RELAY_CMD   = 'led-scheduler/relay-cmd';
  const TOPIC_RELAY_SCHED = 'led-scheduler/relay-schedule';
  const TOPIC_OLED_DRAW   = 'led-scheduler/oled-draw';

  // ── Clock ────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('he-IL', { hour12: false });
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── MQTT ─────────────────────────────────────────────────
  let client;
  let ledState = false;

  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    dot.className = state;
    document.getElementById('status-text').textContent = text;
  }

  function connectMQTT() {
    client = mqtt.connect(BROKER_URL, {
      clientId: 'web-' + Math.random().toString(16).slice(2, 8),
      clean: true,
      reconnectPeriod: 5000,
    });

    client.on('connect', () => setStatus('connected', 'מחובר ל-MQTT ✓'));
    client.on('error',   () => setStatus('error', 'שגיאת חיבור'));
    client.on('offline', () => setStatus('', 'מנותק — מנסה שוב...'));
  }

  connectMQTT();

  // ── LED Control ──────────────────────────────────────────
  function toggleLED() {
    ledState = !ledState;
    updateLEDUI(ledState);
    if (client && client.connected) {
      client.publish(TOPIC_CMD, JSON.stringify({ cmd: ledState ? 'on' : 'off' }));
    }
  }

  function updateLEDUI(on) {
    const btn = document.getElementById('led-toggle');
    const vis = document.getElementById('led-visual');
    btn.textContent = on ? '💡 כבה' : '💡 הדלק';
    btn.className   = on ? 'on' : '';
    vis.className   = on ? 'on' : '';
  }

  // ── Relay Control ────────────────────────────────────────
  let relayState = false;

  function toggleRelay() {
    relayState = !relayState;
    updateRelayUI(relayState);
    if (client && client.connected) {
      client.publish(TOPIC_RELAY_CMD, JSON.stringify({ cmd: relayState ? 'on' : 'off' }));
    }
  }

  function updateRelayUI(on) {
    const btn = document.getElementById('relay-toggle');
    const vis = document.getElementById('relay-visual');
    btn.textContent = on ? '⚡ כבה' : '⚡ הפעל';
    btn.style.background = on ? '#ffe066' : '#2a2a4a';
    btn.style.color = on ? '#1a1a00' : '#aaa';
    vis.style.background = on ? '#ffe066' : '#2a2a2a';
    vis.style.boxShadow = on ? '0 0 20px #ffe066' : 'none';
  }

  // ── Relay Schedule ────────────────────────────────────────
  let relaySchedules = JSON.parse(localStorage.getItem('relaySchedules') || '[]');

  function addRelaySchedule() {
    const onDay   = document.getElementById('rx-on-day').value;
    const onMonth = document.getElementById('rx-on-month').value;
    const onYear  = document.getElementById('rx-on-year').value;
    const onTime  = document.getElementById('rx-on-time').value;
    const offDay  = document.getElementById('rx-off-day').value;
    const offMonth= document.getElementById('rx-off-month').value;
    const offYear = document.getElementById('rx-off-year').value;
    const offTime = document.getElementById('rx-off-time').value;
    if (!onDay || !onMonth || !onYear || !onTime || !offDay || !offMonth || !offYear || !offTime) {
      alert('בחר תאריך ושעה');
      return;
    }
    const onDate  = getDateStr(onDay, onMonth, onYear);
    const offDate = getDateStr(offDay, offMonth, offYear);
    relaySchedules.push({ onDate, onTime, offDate, offTime });
    localStorage.setItem('relaySchedules', JSON.stringify(relaySchedules));
    renderRelaySchedule();
  }

  function deleteRelaySchedule(i) {
    relaySchedules.splice(i, 1);
    localStorage.setItem('relaySchedules', JSON.stringify(relaySchedules));
    renderRelaySchedule();
  }

  function renderRelaySchedule() {
    const list = document.getElementById('relay-schedule-list');
    if (relaySchedules.length === 0) {
      list.innerHTML = '<li id="relay-empty-msg">אין לוז עדיין</li>';
      return;
    }
    const sorted = relaySchedules.map((s, i) => ({ ...s, _orig: i }))
      .sort((a, b) => (a.onDate + a.onTime).localeCompare(b.onDate + b.onTime));
    list.innerHTML = sorted.map(s => `
      <li style="flex-direction:column;align-items:flex-start;gap:0.3rem;">
        <div style="display:flex;justify-content:space-between;width:100%;">
          <span style="font-size:0.8rem;color:#888;">${formatDate(s.onDate)}</span>
          <button class="btn-del" onclick="deleteRelaySchedule(${s._orig})">הסר</button>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;">
          <span class="tag tag-on">⚡ ${s.onTime}</span>
          <span style="color:#555;">→</span>
          <span class="tag tag-off">⚫ ${s.offTime}${s.offDate !== s.onDate ? ' ' + formatDate(s.offDate) : ''}</span>
        </div>
      </li>`).join('');
  }

  function syncRelaySchedule() {
    if (!client || !client.connected) { alert('לא מחובר ל-MQTT'); return; }
    const toSend = [];
    relaySchedules.forEach(s => {
      toSend.push({ time: s.onTime, action: 'on',  date: s.onDate });
      toSend.push({ time: s.offTime, action: 'off', date: s.offDate });
    });
    client.publish(TOPIC_RELAY_SCHED, JSON.stringify({ schedules: toSend }), { retain: true });
    alert('✅ הלוז נשלח!');
  }

  renderRelaySchedule();

  // ── Schedule ─────────────────────────────────────────────
  let schedules = JSON.parse(localStorage.getItem('schedules') || '[]');

  function todayParts() {
    const now = new Date();
    return { d: now.getDate(), m: now.getMonth() + 1, y: now.getFullYear() };
  }

  function getDateStr(day, month, year) {
    return `${String(year).padStart(4,'0')}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  window.addEventListener('load', () => {
    const { d, m, y } = todayParts();
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2, '0');
    const mm  = String(now.getMinutes()).padStart(2, '0');
    const ss  = String(now.getSeconds()).padStart(2, '0');
    const off1min = new Date(now.getTime() + 60000);
    const hh2 = String(off1min.getHours()).padStart(2, '0');
    const mm2 = String(off1min.getMinutes()).padStart(2, '0');
    const ss2 = String(off1min.getSeconds()).padStart(2, '0');

    document.getElementById('on-day').value    = d;
    document.getElementById('on-month').value  = m;
    document.getElementById('on-year').value   = y;
    document.getElementById('on-time').value   = `${hh}:${mm}:${ss}`;
    document.getElementById('off-day').value   = d;
    document.getElementById('off-month').value = m;
    document.getElementById('off-year').value  = y;
    document.getElementById('off-time').value  = `${hh2}:${mm2}:${ss2}`;

    document.getElementById('rx-on-day').value    = d;
    document.getElementById('rx-on-month').value  = m;
    document.getElementById('rx-on-year').value   = y;
    document.getElementById('rx-on-time').value   = `${hh}:${mm}:${ss}`;
    document.getElementById('rx-off-day').value   = d;
    document.getElementById('rx-off-month').value = m;
    document.getElementById('rx-off-year').value  = y;
    document.getElementById('rx-off-time').value  = `${hh2}:${mm2}:${ss2}`;

    ['on-day','on-month','on-year'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        document.getElementById('off-day').value   = document.getElementById('on-day').value;
        document.getElementById('off-month').value = document.getElementById('on-month').value;
        document.getElementById('off-year').value  = document.getElementById('on-year').value;
      });
    });
    ['rx-on-day','rx-on-month','rx-on-year'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        document.getElementById('rx-off-day').value   = document.getElementById('rx-on-day').value;
        document.getElementById('rx-off-month').value = document.getElementById('rx-on-month').value;
        document.getElementById('rx-off-year').value  = document.getElementById('rx-on-year').value;
      });
    });
  });

  function renderSchedule() {
    const list = document.getElementById('schedule-list');
    if (schedules.length === 0) {
      list.innerHTML = '<li id="empty-msg">אין לוז עדיין</li>';
      return;
    }
    const sorted = schedules
      .map((s, i) => ({ ...s, _orig: i }))
      .sort((a, b) => (a.onDate + a.onTime).localeCompare(b.onDate + b.onTime));
    list.innerHTML = sorted.map(s => `
      <li style="flex-direction:column;align-items:flex-start;gap:0.3rem;">
        <div style="display:flex;justify-content:space-between;width:100%;">
          <span style="font-size:0.8rem;color:#888;">${formatDate(s.onDate)}</span>
          <button class="btn-del" onclick="deleteSchedule(${s._orig})">הסר</button>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;">
          <span class="tag tag-on">💡 ${s.onTime}</span>
          <span style="color:#555;">→</span>
          <span class="tag tag-off">⚫ ${s.offTime}${s.offDate !== s.onDate ? ' ' + formatDate(s.offDate) : ''}</span>
        </div>
      </li>`).join('');
  }

  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function addSchedule() {
    const onDay   = document.getElementById('on-day').value;
    const onMonth = document.getElementById('on-month').value;
    const onYear  = document.getElementById('on-year').value;
    const onTime  = document.getElementById('on-time').value;
    const offDay  = document.getElementById('off-day').value;
    const offMonth= document.getElementById('off-month').value;
    const offYear = document.getElementById('off-year').value;
    const offTime = document.getElementById('off-time').value;
    if (!onDay || !onMonth || !onYear || !onTime || !offDay || !offMonth || !offYear || !offTime) {
      alert('בחר תאריך ושעה להדלקה וכיבוי');
      return;
    }
    const onDate  = getDateStr(onDay, onMonth, onYear);
    const offDate = getDateStr(offDay, offMonth, offYear);
    schedules.push({ onDate, onTime, offDate, offTime });
    localStorage.setItem('schedules', JSON.stringify(schedules));
    renderSchedule();
  }

  function deleteSchedule(i) {
    schedules.splice(i, 1);
    localStorage.setItem('schedules', JSON.stringify(schedules));
    renderSchedule();
  }

  function syncSchedule() {
    if (!client || !client.connected) {
      alert('לא מחובר ל-MQTT. בדוק חיבור.');
      return;
    }
    const toSend = [];
    schedules.forEach(s => {
      toSend.push({ time: s.onTime, action: 'on',  date: s.onDate  });
      toSend.push({ time: s.offTime, action: 'off', date: s.offDate });
    });
    client.publish(TOPIC_SCHED, JSON.stringify({ schedules: toSend }), { retain: true });
    alert('✅ הלוז נשלח ל-ESP32!');
  }

  renderSchedule();
</script>
</body>
</html>
